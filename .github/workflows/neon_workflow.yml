name: Neon PR Check (No Branch Create/Delete)

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  neon_pr_check:
    name: Neon PR Check
    runs-on: ubuntu-latest
    steps:
      - name: Info
        run: |
          echo "Neon branch provisioning is disabled for this workflow."
          echo "Use a fixed DATABASE_URL secret in your build/test workflow if needed."